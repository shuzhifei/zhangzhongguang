<script>
// 动画生成按钮事件绑定（等待DOM和模块就绪）
document.addEventListener('DOMContentLoaded', function() {
    const btn = document.getElementById('start-animate-btn');
    const closeBtn = document.getElementById('animate-close');
    const modal = document.getElementById('animation-modal');

    if (!btn || !modal) return;

    btn.addEventListener('click', async function() {
        if (typeof puppetStage === 'undefined') {
            alert('皮影系统尚未就绪，请稍后再试');
            return;
        }

        const layout = puppetStage.getShadowLayoutJSON();
        if (!layout.puppets || layout.puppets.length === 0) {
            alert('请先将皮影拖拽至白布戏台，再生成动画');
            return;
        }

        if (typeof gameState === 'undefined') {
            alert('游戏状态未初始化');
            return;
        }

        if (gameState.lampOil < 10) {
            alert('灯油不足（至少需要10%），无法起影开戏');
            return;
        }

        // 消耗灯油
        if (typeof lampSystem !== 'undefined') {
            lampSystem.cutOil(10);
        }
        gameState.lampOil = Math.max(0, gameState.lampOil - 10);
        var oilEl = document.getElementById('oil-value') || document.getElementById('oilText');
        if (oilEl) oilEl.textContent = Math.round(gameState.lampOil);

        btn.disabled = true;
        btn.textContent = '⏳ AI正在生成皮影动画...';

        try {
            var result = await AnimateRequest.generateFullAnimation(layout, gameState);

            if (result.success) {
                var player = new AnimatePlayer(result.data);
                window._animatePlayer = player;
                player.playAllShots();
            } else {
                alert('AI动画生成失败，启用简易兜底动画\n' + (result.error || ''));
                FallbackAnimate.injectSwingStyle();
                FallbackAnimate.runSimpleStage(layout, gameState);
            }
        } catch (e) {
            console.error('[动画按钮] 异常:', e);
            alert('动画生成异常：' + e.message);
            FallbackAnimate.injectSwingStyle();
            FallbackAnimate.runSimpleStage(layout, gameState);
        }

        btn.disabled = false;
        btn.textContent = '🏮 起影开戏';
    });

    if (closeBtn) {
        closeBtn.addEventListener('click', function() {
            modal.classList.remove('show');
            var video = document.getElementById('animate-video');
            if (video) { video.pause(); video.src = ''; }
            if (typeof audioSystem !== 'undefined') audioSystem.stopAllVoice();
            if (typeof gameState !== 'undefined' && gameState.afterAnimationCallback) {
                gameState.afterAnimationCallback();
            }
        });
    }

    console.log('[动画] 起影开戏按钮就绪');
});
</script>

            <button id="animate-close">关闭动画</button>
        </div>
