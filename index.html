<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掌中光 · 第一幕 — 琉璃厂·书生与鹤</title>
<link rel="stylesheet" href="css/act1.css">
</head>
<body>

<div class="header">掌 中 光 · 第 一 幕 — 琉璃厂·书生与鹤</div>

<div class="main-area">
    <!-- 左侧：皮影箱 -->
    <div class="puppet-box scroll" id="puppetBox">
        <h3>皮 影 箱</h3>
        <div class="scene-info" id="sceneInfo">第1场 · 月夜等人</div>

            <!-- 书生 -->
            <div class="puppet-card" data-puppet="scholar" data-act="1">
                <div class="puppet-icon"><img src="assets/images/scholar.png" alt="scholar" draggable="false"></div>
                <div class="puppet-name">书 生</div>
            </div>

            <!-- 槐树 -->
            <div class="puppet-card" data-puppet="tree" data-act="1">
                <div class="puppet-icon"><img src="assets/images/tree.png" alt="tree" draggable="false"></div>
                <div class="puppet-name">槐 树</div>
            </div>

            <!-- 月亮 -->
            <div class="puppet-card" data-puppet="moon" data-act="1,3">
                <div class="puppet-icon"><img src="assets/images/moon.png" alt="moon" draggable="false"></div>
                <div class="puppet-name">月 亮</div>
            </div>

            <!-- 老者 -->
            <div class="puppet-card" data-puppet="elder" data-act="1,2,3">
                <div class="puppet-icon"><img src="assets/images/elder.png" alt="elder" draggable="false"></div>
                <div class="puppet-name">老 者</div>
            </div>

            <!-- 信 -->
            <div class="puppet-card" data-puppet="letter" data-act="1">
                <div class="puppet-icon"><svg viewBox="0 0 100 100">
<defs>
  <linearGradient id="letterGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f5e6c0"/><stop offset="100%" stop-color="#d4b888"/></linearGradient>
</defs>
<!-- 信封背面 -->
<rect x="18" y="22" width="64" height="60" rx="2" fill="url(#letterGrad)" stroke="#8b6914" stroke-width="1.5"/>
<!-- 信封折痕（V形） -->
<path d="M18,22 L50,50 L82,22" fill="none" stroke="#8b6914" stroke-width="1.2"/>
<path d="M18,22 L50,50 L82,22 L82,82 L18,82 Z" fill="none" stroke="#8b6914" stroke-width="0.8" opacity="0.5"/>
<!-- 信封正面（下半部分） -->
<path d="M18,50 L50,50 L82,50 L82,82 L18,82 Z" fill="#e8d5a0" stroke="#8b6914" stroke-width="1"/>
<!-- 封口火漆 -->
<circle cx="50" cy="62" r="7" fill="#c43030" stroke="#8b1a1a" stroke-width="1"/>
<circle cx="50" cy="62" r="4" fill="#a02020" opacity="0.6"/>
<path d="M47,59 L50,62 L53,59 M50,59 L50,65" stroke="#8b1a1a" stroke-width="0.8"/>
<!-- 信封边纹 -->
<path d="M22,28 L26,28 M22,32 L28,32" stroke="#c4a050" stroke-width="0.6" opacity="0.4"/>
<path d="M74,28 L78,28 M72,32 L78,32" stroke="#c4a050" stroke-width="0.6" opacity="0.4"/>
<!-- 地址竖排（仿古） -->
<line x1="30" y1="56" x2="30" y2="74" stroke="#8b6914" stroke-width="0.5" opacity="0.3"/>
<line x1="70" y1="56" x2="70" y2="74" stroke="#8b6914" stroke-width="0.5" opacity="0.3"/>
<!-- 阴影 -->
<rect x="22" y="26" width="56" height="52" rx="1" fill="none" stroke="#c4a050" stroke-width="0.4" opacity="0.2"/>
                </svg></div>
                <div class="puppet-name">信</div>
            </div>

            <!-- 金蟾 -->
            <div class="puppet-card" data-puppet="frog" data-act="1">
                <div class="puppet-icon"><img src="assets/images/frog.png" alt="frog" draggable="false"></div>
                <div class="puppet-name">金 蟾</div>
            </div>

            <!-- 灯 -->
            <div class="puppet-card" data-puppet="lamp" data-act="1,2,3">
                <div class="puppet-icon"><svg viewBox="0 0 80 140">
<defs>
  <linearGradient id="lampBaseGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6b4020"/><stop offset="100%" stop-color="#3a2010"/></linearGradient>
  <radialGradient id="flameGrad" cx="50%" cy="70%"><stop offset="0%" stop-color="#fff8d0"/><stop offset="30%" stop-color="#f0c850"/><stop offset="60%" stop-color="#e08820"/><stop offset="100%" stop-color="#c04010"/></radialGradient>
</defs>
<!-- 火焰 -->
<path d="M40,12 Q35,18 36,28 Q38,35 40,38 Q42,35 44,28 Q45,18 40,12 Z" fill="url(#flameGrad)" stroke="#8b4513" stroke-width="0.8"/>
<ellipse cx="40" cy="30" rx="3" ry="6" fill="#fff8d0" opacity="0.6"/>
<!-- 灯芯 -->
<line x1="40" y1="38" x2="40" y2="45" stroke="#3a2010" stroke-width="1.5"/>
<!-- 灯口 -->
<ellipse cx="40" cy="45" rx="12" ry="3" fill="#5a3a1a" stroke="#3a2010" stroke-width="1"/>
<!-- 灯碗（油碗） -->
<path d="M28,45 Q26,55 30,62 L50,62 Q54,55 52,45 Z" fill="url(#lampBaseGrad)" stroke="#3a2010" stroke-width="1.5"/>
<!-- 油面 -->
<ellipse cx="40" cy="47" rx="10" ry="2" fill="#e8a020" opacity="0.5"/>
<!-- 灯柱 -->
<rect x="36" y="62" width="8" height="50" rx="1" fill="url(#lampBaseGrad)" stroke="#3a2010" stroke-width="1.2"/>
<!-- 灯柱纹路 -->
<line x1="38" y1="70" x2="38" y2="105" stroke="#3a2010" stroke-width="0.5" opacity="0.4"/>
<line x1="42" y1="70" x2="42" y2="105" stroke="#3a2010" stroke-width="0.5" opacity="0.4"/>
<rect x="35" y="80" width="10" height="3" fill="#5a3a1a" opacity="0.5"/>
<rect x="35" y="95" width="10" height="3" fill="#5a3a1a" opacity="0.5"/>
<!-- 底座 -->
<path d="M24,112 L56,112 L58,125 L22,125 Z" fill="url(#lampBaseGrad)" stroke="#3a2010" stroke-width="1.5"/>
<rect x="20" y="125" width="40" height="8" rx="2" fill="#3a2010" stroke="#1a0a02" stroke-width="1"/>
<!-- 底座纹 -->
<circle cx="40" cy="118" r="3" fill="#c4a050" opacity="0.3" stroke="#8b6914" stroke-width="0.5"/>
<!-- 光晕 -->
<circle cx="40" cy="25" r="20" fill="#f0c850" opacity="0.06"/>
<circle cx="40" cy="25" r="15" fill="#f0c850" opacity="0.1"/>
                </svg></div>
                <div class="puppet-name">灯</div>
            </div>

        </div>

        <!-- 中间：白布舞台 -->
        <div class="stage-wrapper">
            <div class="stage" id="stage">
                <div class="stage-hint">将皮影拖入幕布</div>
            </div>
        </div>

        <!-- 右侧：信息面板 -->
        <div class="info-panel">
            <div class="lamp-section">
                <div class="lamp-label">灯 油</div>
                <div class="flame-container">
                    <div class="flame" id="flame"></div>
                </div>
                <div class="oil-bar-outer">
                    <div class="oil-bar-inner" id="oilBar"></div>
                </div>
                <div class="oil-text" id="oilText">100 / 100</div>
            </div>
            <div class="ending-preview">当前倾向结局：<br><span id="endingHint">——</span></div>
        </div>
    </div>

<!-- 底部：对话框 -->
<div class="dialogue-area">
    <div class="dialogue-speaker" id="speaker">路师傅</div>
    <div class="dialogue-text scroll" id="dialogueText">
        民国十七年秋，琉璃厂旧书街。<br><br>
        一个书生在等人——但他等的不是人，是一封永远不会寄到的信。
    </div>
    <div class="btn-row">
        <button class="btn" id="btnConfirm">确认摆影</button>
        <button class="btn" id="btnAsk">追问师父</button>
        <button class="btn" id="btnNext" style="display:none;">下一场</button>
    </div>
</div>

<!-- 外部脚本：按依赖顺序加载 -->
<script src="js/event-bus.js"></script>
<script src="js/game.js"></script>
<script src="js/lamp.js"></script>
<script src="js/save.js"></script>
<script src="js/puppet-images.js"></script>
<script src="js/act1-scenes.js"></script>
<script src="js/act1-core.js"></script>

</body>
</html>
