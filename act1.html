<style>
/* ========================================
   掌中光 - 皮影戏台 · 真实皮影美学
   ======================================== */

* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-user-drag: none; }
*:focus { outline: none !important; }
*:focus-visible { outline: none !important; }
img { -webkit-user-drag: none; pointer-events: none; }

body {
    background: #080402;
    font-family: 'STKaiti', 'KaiTi', '楷体', 'Microsoft YaHei', serif;
    height: 100vh;
    overflow: hidden;
    color: #c4a46c;
}

.header {
    height: 54px;
    background: linear-gradient(180deg, #4a1f0a 0%, #2d1105 50%, #1a0802 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e8c97a;
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 12px;
    border-bottom: 3px solid #6b3a1f;
    text-shadow: 0 0 18px rgba(232, 180, 90, 0.5), 0 2px 4px rgba(0,0,0,0.8);
    box-shadow: 0 2px 12px rgba(0,0,0,0.6);
    position: relative;
    z-index: 10;
}

.main-area {
    display: flex;
    height: calc(100vh - 54px - 180px);
    background: #0a0502;
    position: relative;
}

.puppet-box {
    width: 230px;
    background: linear-gradient(90deg, #140904, #1f0f07 30%, #2a140a 100%);
    border-right: 4px solid #4a2512;
    padding: 12px 10px;
    color: #c4a46c;
    overflow-y: auto;
    box-shadow: inset -4px 0 12px rgba(0,0,0,0.5);
}

.puppet-box h3 {
    color: #e8c97a;
    font-size: 18px;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 6px;
    border-bottom: 2px solid #6b3a1f;
    padding-bottom: 10px;
    text-shadow: 0 0 10px rgba(232, 180, 90, 0.3);
}

.puppet-box .scene-info {
    font-size: 11px;
    color: #8b6914;
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: 1px;
    opacity: 0.85;
}

.puppet-card .puppet-icon svg {
    width: 100%;
    height: 100%;
    display: block;
    pointer-events: none;
}

.puppet-card {
    background: linear-gradient(135deg, rgba(100,50,20,0.5), rgba(60,25,10,0.6));
    border: 2px solid #5a2d15;
    border-radius: 2px;
    padding: 8px 6px 6px;
    margin-bottom: 10px;
    cursor: grab;
    text-align: center;
    transition: all 0.25s;
    position: relative;
}

.puppet-card::after {
    content: '';
    position: absolute;
    top: -1px; left: -1px;
    right: -1px; bottom: -1px;
    border: 1px solid rgba(200,150,80,0.15);
    pointer-events: none;
}

.puppet-card:hover {
    background: linear-gradient(135deg, rgba(140,70,25,0.6), rgba(80,35,15,0.7));
    border-color: #c48a3e;
    box-shadow: 0 0 18px rgba(200,130,50,0.25);
    transform: translateY(-1px);
}

.puppet-card:active {
    cursor: grabbing;
    transform: scale(0.97);
}

.puppet-card.hidden {
    display: none;
}

.puppet-card .puppet-icon {
    display: block;
    width: 100%;
    height: 110px;
    margin-bottom: 4px;
}

.puppet-card .puppet-icon svg {
    width: 100%;
    height: 100%;
}

.puppet-card .puppet-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
}

.puppet-card .puppet-name {
    font-size: 14px;
    color: #e8c97a;
    letter-spacing: 3px;
}

.stage-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    position: relative;
}

.stage-wrapper::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(200,150,80,0.06) 0%, transparent 70%);
    pointer-events: none;
}

.stage {
    width: 100%;
    height: 100%;
    position: relative;
    background:
        radial-gradient(ellipse 60% 50% at 50% 50%, rgba(255,220,150,0.35) 0%, rgba(240,200,130,0.15) 40%, transparent 70%),
        url('assets/images/stage-bg.jpg');
    background-size: cover;
    background-position: center;
    border-radius: 3px;
    box-shadow:
        inset 0 0 80px rgba(180,120,50,0.2),
        0 0 0 10px #3d1c08,
        0 0 0 13px #2a1005,
        0 0 0 15px #1a0802,
        0 4px 30px rgba(0,0,0,0.7);
    overflow: hidden;
}

.stage::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
        repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(180,140,100,0.04) 2px, rgba(180,140,100,0.04) 3px),
        repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(160,120,80,0.03) 1px, rgba(160,120,80,0.03) 2px);
    pointer-events: none;
    z-index: 1;
}

.stage::after {
    content: '';
    position: absolute;
    inset: 15%;
    background: radial-gradient(ellipse at center, rgba(255,200,100,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
}

.stage-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #8B6914;
    font-size: 16px;
    opacity: 0.3;
    letter-spacing: 6px;
    pointer-events: none;
    z-index: 2;
    font-family: 'STKaiti', 'KaiTi', '楷体', serif;
}

.stage-puppet {
    position: absolute;
    cursor: grab;
    user-select: none;
    -webkit-user-drag: none;
    z-index: 3;
    filter: drop-shadow(3px 4px 6px rgba(0,0,0,0.5)) drop-shadow(0 0 2px rgba(180,120,50,0.3));
}
.stage-puppet:focus { outline: none !important; }

.stage-puppet svg {
    width: 100%;
    height: 100%;
    display: block;
}

.stage-puppet img {
    display: block;
    pointer-events: none;
}

.puppet-drag-clone {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.85;
    filter: drop-shadow(4px 6px 12px rgba(0,0,0,0.6)) drop-shadow(0 0 8px rgba(220,160,60,0.3));
}

.puppet-drag-clone svg {
    width: 100%;
    height: 100%;
    display: block;
}

.puppet-card.dragging {
    opacity: 0.3;
    transform: scale(0.95);
}

.info-panel {
    width: 180px;
    background: linear-gradient(270deg, #140904, #1f0f07 30%, #2a140a 100%);
    border-left: 4px solid #4a2512;
    padding: 24px 12px;
    color: #c4a46c;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: inset 4px 0 12px rgba(0,0,0,0.5);
}

.lamp-section {
    text-align: center;
}

.lamp-label {
    color: #e8c97a;
    font-size: 15px;
    letter-spacing: 4px;
    margin-bottom: 12px;
}

.flame-container {
    width: 50px;
    height: 60px;
    margin: 0 auto 10px;
    position: relative;
}

.flame {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 44px;
    background: radial-gradient(ellipse at 50% 80%, #ffe8a0 0%, #f0b830 25%, #e08820 50%, #c04010 80%, transparent 100%);
    border-radius: 60% 60% 30% 30%;
    animation: flicker 0.12s infinite alternate;
    filter: blur(0.5px);
}

.flame::before {
    content: '';
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 24px;
    background: radial-gradient(ellipse at 50% 100%, #fffde0 0%, #ffe8a0 30%, transparent 80%);
    border-radius: 50%;
    animation: flickerInner 0.1s infinite alternate-reverse;
}

@keyframes flicker {
    0%   { transform: translateX(-50%) scaleX(1)    scaleY(1);    opacity: 0.9; }
    33%  { transform: translateX(-50%) scaleX(0.85) scaleY(1.06); opacity: 1; }
    66%  { transform: translateX(-50%) scaleX(1.08) scaleY(0.94); opacity: 0.85; }
    100% { transform: translateX(-50%) scaleX(0.92) scaleY(1.03); opacity: 0.95; }
}

@keyframes flickerInner {
    0%   { transform: translateX(-50%) scale(1); }
    100% { transform: translateX(-50%) scale(0.85, 1.1) translateY(-2px); }
}

.oil-bar-outer {
    width: 100px;
    height: 10px;
    background: #1a0802;
    border: 1px solid #5a2d15;
    border-radius: 5px;
    overflow: hidden;
    margin: 0 auto;
}

.oil-bar-inner {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #c48a3e, #e8b850, #f0c860);
    border-radius: 5px;
    transition: width 0.6s ease, background 0.6s ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
}

.oil-text {
    color: #e8c97a;
    font-size: 12px;
    margin-top: 6px;
    letter-spacing: 1px;
}

.dialogue-area {
    height: 180px;
    background: linear-gradient(0deg, #0a0401, #140904 50%, #1f0f07 100%);
    border-top: 3px solid #4a2512;
    padding: 14px 20px;
    display: flex;
    flex-direction: column;
    color: #c4a46c;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.5);
}

.dialogue-speaker {
    color: #e8c97a;
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 6px;
    letter-spacing: 2px;
}

.dialogue-text {
    flex: 1;
    font-size: 16px;
    line-height: 1.9;
    padding: 12px 14px;
    background: rgba(0,0,0,0.35);
    border-radius: 3px;
    border: 1px solid rgba(90,45,21,0.4);
    overflow-y: auto;
    letter-spacing: 0.5px;
}

.btn-row {
    display: flex;
    gap: 12px;
    margin-top: 10px;
    justify-content: center;
}

.btn {
    padding: 9px 24px;
    border: 1px solid #8b6914;
    background: linear-gradient(180deg, rgba(200,140,60,0.15), rgba(140,80,30,0.1));
    color: #e8c97a;
    font-size: 15px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    font-family: 'STKaiti', 'KaiTi', '楷体', 'Microsoft YaHei', serif;
    letter-spacing: 3px;
}

.btn:hover {
    background: linear-gradient(180deg, rgba(220,160,70,0.25), rgba(180,100,40,0.15));
    border-color: #c48a3e;
    box-shadow: 0 0 14px rgba(200,130,50,0.2);
}

.btn:active {
    transform: scale(0.96);
}

.btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
}

@keyframes stageFadeOut {
    0%   { filter: brightness(1); }
    50%  { filter: brightness(0.4); }
    100% { filter: brightness(0.08); }
}

.stage-dark {
    animation: stageFadeOut 2.5s ease-in-out forwards;
}

.flame-gone {
    opacity: 0 !important;
    transition: opacity 1.2s ease-out;
}

.ending-preview {
    margin-top: 20px;
    font-size: 12px;
    color: #8b6914;
    text-align: center;
    line-height: 1.6;
    border-top: 1px solid rgba(90,45,21,0.4);
    padding-top: 12px;
}

.ending-preview span {
    color: #c48a3e;
    font-weight: bold;
    font-size: 14px;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #0a0502; }
::-webkit-scrollbar-thumb { background: #4a2512; border-radius: 3px; }
</style>
</head>

<script>
// ========================================
// event-bus.js — 通信枢纽
// ========================================
const EventBus = {
    listeners: {},
    on(eventName, callback) {
        if (!this.listeners[eventName]) this.listeners[eventName] = [];
        this.listeners[eventName].push(callback);
    },
    emit(eventName, data) {
        const callbacks = this.listeners[eventName];
        if (!callbacks) return;
        callbacks.forEach(function(callback) {
            try { callback(data); } catch (error) { console.error('EventBus error: '+eventName, error); }
        });
    },
    off(eventName, callback) {
        const callbacks = this.listeners[eventName];
        if (!callbacks) return;
        const idx = callbacks.indexOf(callback);
        if (idx !== -1) callbacks.splice(idx, 1);
    }
};
window.EventBus = EventBus;
</script>

<script>
// ========================================
// game.js — 游戏全局状态管理
// ========================================
class GameState {
    constructor() {
        this.currentAct = 1;
        this.currentScene = 0;
        this.isGameOver = false;
        this.lampOil = 100;
        this.totalOilBurned = 0;
        this.ownedPuppets = ["scholar","tree","moon","elder","frog","letter","lamp","demon","monkey","bamboo","master"];
        this.stagedPuppets = [];
        this.usedPuppets = [];
        this.triggeredClues = [];
        this.endingStats = { faithfulness: 0, creativity: 0, oilConservation: 0, questionsAsked: 0 };
        this.aiQuality = "high";
    }
    updateAIQuality() {
        if (this.lampOil >= 60) this.aiQuality = "high";
        else if (this.lampOil >= 30) this.aiQuality = "medium";
        else if (this.lampOil > 0) this.aiQuality = "low";
        else this.aiQuality = "critical";
    }
    toJSON() {
        return JSON.stringify({
            currentAct: this.currentAct, currentScene: this.currentScene, isGameOver: this.isGameOver,
            lampOil: this.lampOil, totalOilBurned: this.totalOilBurned,
            ownedPuppets: this.ownedPuppets, stagedPuppets: this.stagedPuppets,
            usedPuppets: this.usedPuppets, triggeredClues: this.triggeredClues,
            endingStats: this.endingStats, aiQuality: this.aiQuality
        });
    }
    static fromJSON(jsonStr) { const data = JSON.parse(jsonStr); const s = new GameState(); Object.assign(s, data); return s; }
}
const gameState = new GameState();
window.gameState = gameState;

function determineEnding(state) {
    const { lampOil, endingStats } = state;
    const { faithfulness, creativity } = endingStats;
    if (creativity >= 80) return { name: "影子师傅", desc: "你走了自己的路——成为了非传统的传承人。" };
    if (lampOil >= 30 && faithfulness >= 70 && creativity >= 50) return { name: "传灯", desc: "你成为新的说戏人。" };
    if (lampOil >= 15 && faithfulness >= 60) return { name: "守灯", desc: "灯一直在闪，但没有灭。" };
    if (faithfulness >= 40) return { name: "残影", desc: "灯灭了。但白布上还有影子。" };
    return { name: "灯灭", desc: "全黑。师傅最后一句：「没事。灯灭过很多次。每次都会有人再点起来。」" };
}
window.determineEnding = determineEnding;
</script>

<script>
// ========================================
// lamp.js — 灯油消耗/奖励/恢复系统
// ========================================
let countdownTimer = null;
let secondsLeft = 10;

function updateOilUI() {
    const oil = gameState.lampOil;
    const oilText = document.getElementById('oilText');
    if (oilText) oilText.textContent = oil + ' / 100';
    const oilBar = document.getElementById('oilBar');
    if (oilBar) oilBar.style.width = oil + '%';
}

const LampSystem = {
    COSTS: { puppet_placed: 3, puppet_removed: 1, puppet_moved: 1, ask_master: 8, wrong_puppet: 5, time_penalty: 2 },
    REWARDS: { correct_judge: 2, creativity_bonus: 3, partial_correct: 1, perfect_scene: 10 },
    RECOVERY: { intermission: 80 },
    burn(reason) {
        const cost = this.COSTS[reason] || 0;
        gameState.lampOil = Math.max(0, gameState.lampOil - cost);
        gameState.totalOilBurned += cost;
        gameState.updateAIQuality();
        updateOilUI();
        EventBus.emit("oil_changed", { oil: gameState.lampOil, reason });
        if (gameState.lampOil <= 0) { EventBus.emit("oil_depleted", { state: gameState }); return true; }
        return false;
    },
    reward(reason) {
        const gain = this.REWARDS[reason] || 0;
        gameState.lampOil = Math.min(100, gameState.lampOil + gain);
        gameState.updateAIQuality();
        updateOilUI();
        EventBus.emit("oil_changed", { oil: gameState.lampOil, reason });
    },
    intermissionRecover() {
        gameState.lampOil = this.RECOVERY.intermission;
        gameState.updateAIQuality();
        updateOilUI();
        EventBus.emit("oil_changed", { oil: gameState.lampOil, reason: "intermission" });
    },
    startCountdown() {
        secondsLeft = 10;
        if (countdownTimer) clearInterval(countdownTimer);
        countdownTimer = setInterval(function() {
            secondsLeft--;
            EventBus.emit("countdown_tick", { time: secondsLeft });
            LampSystem.burn("time_penalty");
            if (secondsLeft <= 0) { clearInterval(countdownTimer); countdownTimer = null; EventBus.emit("countdown_expired"); }
        }, 1000);
    },
    stopCountdown() {
        if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
        secondsLeft = 0;
    }
};
window.LampSystem = LampSystem;

// 事件监听
EventBus.on("puppet_placed", function(data) {
    LampSystem.burn("puppet_placed");
    if (data && data.id && gameState.stagedPuppets.indexOf(data.id) === -1) gameState.stagedPuppets.push(data.id);
});
EventBus.on("puppet_removed", function() { LampSystem.burn("puppet_removed"); });
EventBus.on("puppet_moved", function() { LampSystem.burn("puppet_moved"); });
EventBus.on("ask_master", function() { LampSystem.burn("ask_master"); });
EventBus.on("judge_result", function(result) { if (result && result.correct) LampSystem.reward("correct_judge"); });
EventBus.on("act_intermission", function() { LampSystem.intermissionRecover(); });
EventBus.on("countdown_stop_request", function() { LampSystem.stopCountdown(); });
console.log('[lamp] 灯油事件监听已注册');
</script>

<script>
// ========================================
// save.js — 存档/读档/清档系统
// ========================================
const SaveSystem = {
    KEY: "zzg_act1",
    _memoryStore: {},
    _isStorageAvailable() { try { const t = "__t__"; localStorage.setItem(t,t); localStorage.removeItem(t); return true; } catch(e) { return false; } },
    _getStorage() { return this._isStorageAvailable() ? localStorage : this._memoryStore; },
    save() {
        try {
            const json = gameState.toJSON();
            const s = this._getStorage();
            if (s === localStorage) localStorage.setItem(this.KEY, json); else this._memoryStore[this.KEY] = json;
            console.log("存档成功"); return true;
        } catch(e) { console.error("存档失败", e); return false; }
    },
    load() {
        try {
            const s = this._getStorage();
            const json = s === localStorage ? localStorage.getItem(this.KEY) : (this._memoryStore[this.KEY] || null);
            if (!json) return false;
            Object.assign(gameState, GameState.fromJSON(json));
            console.log("读档成功");
            EventBus.emit("save_loaded", { state: gameState });
            return true;
        } catch(e) { console.error("读档失败", e); return false; }
    },
    clear() {
        try {
            const s = this._getStorage();
            if (s === localStorage) localStorage.removeItem(this.KEY); else delete this._memoryStore[this.KEY];
            console.log("存档已删除");
        } catch(e) { console.error("清档失败", e); }
    }
};
window.SaveSystem = SaveSystem;
</script>

    lamp:    'assets/images/lamp.png',
    master:  'assets/images/master.png',
    demon:   null,
    monkey:  null,
    bamboo:  null,
};
const PUPPET_EMOJI = { scholar:'📜', elder:'👴', tree:'🌳', moon:'🌙', letter:'✉️', frog:'🐸', demon:'👹', monkey:'🐵', lamp:'💡', master:'👨‍🏫', bamboo:'🎋' };
const PuppetImageRenderer = {
    getPath(id) { return PuppetImageMap[id] || null; },
    hasImage(id) { return !!PuppetImageMap[id]; },
    render(id, opts) {
        if (typeof opts === 'number') opts = { width: opts };
        const path = this.getPath(id);
        const w = opts && opts.width || 120;
        const h = opts && opts.height || 'auto';
        if (path) {
            return '<img src="'+path+'" alt="'+id+'" style="width:'+w+'px;'+(h!=='auto'?'height:'+h+'px;':'')+'object-fit:contain;pointer-events:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));" draggable="false">';
        }
        const emoji = PUPPET_EMOJI[id] || '🎭';
        return '<span style="font-size:40px;user-select:none;">'+emoji+'</span>';
    },
    preload() {
        const ids = Object.keys(PuppetImageMap).filter(function(id) { return PuppetImageMap[id]; });
        return Promise.all(ids.map(function(id) { return new Promise(function(resolve) { const img = new Image(); img.src = PuppetImageMap[id]; img.onload = function() { resolve({id:id,ok:true}); }; img.onerror = function() { resolve({id:id,ok:false}); }; }); }));
    }
};
window.PuppetImageMap = PuppetImageMap;
window.PuppetImageRenderer = PuppetImageRenderer;
</script>

<script>
// ========================================
// ai-api.js — 通义千问API调用模块
// ========================================
const AI = {
    get API_KEY() { return (typeof API_CONFIG !== 'undefined') ? API_CONFIG.API_KEY : 'sk-未配置'; },
    get API_URL() { return (typeof API_CONFIG !== 'undefined') ? API_CONFIG.API_URL : 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions'; },
    MODEL_DEFAULT: 'qwen-turbo',
    MODEL_PREMIUM: 'qwen-plus',
    MODEL_MAX: 'qwen-max',
    SPEECH_SPEED: 220,

    _headers() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.API_KEY }; },

    async call(systemPrompt, userMessage, options) {
        options = options || {};
        var model = options.model || this.MODEL_DEFAULT;
        var temperature = options.temperature !== undefined ? options.temperature : 0.3;
        var maxTokens = options.maxTokens || 800;
        var body = { model: model, messages: [{role:'system',content:systemPrompt},{role:'user',content:userMessage}], max_tokens: maxTokens, temperature: temperature, stream: false };
        try {
            var response = await fetch(this.API_URL, { method:'POST', headers: this._headers(), body: JSON.stringify(body) });
            if (!response.ok) { var et = await response.text().catch(function(){return'未知错误';}); throw new Error('API HTTP '+response.status+': '+et); }
            var data = await response.json();
            if (!data.choices || data.choices.length === 0) throw new Error('API返回为空');
            return data.choices[0].message.content;
        } catch(error) { return this._fallbackText('call'); }
    },

    _fallbackText(type) {
        var list = ['师傅沉默了，灯火也跟着暗了一下……（网络不太顺畅，请稍后再试）','油灯爆了一个灯花，师傅的声音被吞没了。再试一次吧。'];
        return list[Math.floor(Math.random()*list.length)];
    }
};
</script>

<script>
// ========================================
// shadow-judge.js — 影面评判系统（精简版）
// ========================================
const ShadowJudge = {
    async judge(stagedPuppets, currentSceneId, isImprov) {
        isImprov = isImprov || false;
        var scene = this._getSceneData(currentSceneId);
        if (!scene) return this._defaultResult();
        if (stagedPuppets.length === 0) return { score:0, correct:false, comment:'白布上什么都没有。' };
        var shadowDesc = this.puppetsToText(stagedPuppets);
        var systemPrompt, userMessage;
        if (isImprov) {
            systemPrompt = PROMPTS_DATA.improvJudgeSystemPrompt;
            userMessage = '学徒摆了以下皮影：\n'+shadowDesc+'\n\n三个关键词：'+((scene.keywords||[]).join('、'))+'\n\n请从五个维度评判，返回JSON。';
        } else {
            systemPrompt = PROMPTS_DATA.judgeSystemPrompt;
            userMessage = '【当前场景】\n'+scene.description+'\n\n【期望皮影】'+((scene.standard_puppets||[]).join('、'))+'\n\n【学徒影面】\n'+shadowDesc+'\n\n请从四个维度评判，返回JSON。';
        }
        try {
            var rawResult = await AI.call(systemPrompt, userMessage, {temperature:0.2,maxTokens:300,model:AI.MODEL_DEFAULT});
            var result = this._parseJSON(rawResult, isImprov);
            EventBus.emit('judge_result', result);
            return result;
        } catch(e) { return this._defaultResult(isImprov); }
    },

    puppetsToText(puppets) {
        if (!puppets||puppets.length===0) return '白布上空无一物。';
        return puppets.map(function(p) { return p.name+'在'+ShadowJudge._getAreaDescription(p.x,p.y); }).join('，')+'。';
    },

    _getAreaDescription(x, y) {
        var h = x<0.33?'左侧':x>0.66?'右侧':'中央';
        var v = y<0.33?'上方':y>0.66?'下方':'中间';
        if (h==='左侧'&&v==='上方') return '左上角';
        if (h==='右侧'&&v==='上方') return '右上角';
        if (h==='左侧'&&v==='下方') return '左下角';
        if (h==='右侧'&&v==='下方') return '右下角';
        if (h==='中央'&&v==='中间') return '白布正中央';
        return h+v;
    },

    quickJudge(stagedPuppets, currentSceneId) {
        var scene = this._getSceneData(currentSceneId);
        if (!scene||!scene.standard_puppets) return {score:50,correct:true,comment:'……（灯太暗了，看不清影面）'};
        var placedIds = stagedPuppets.map(function(p){return p.puppetId;});
        var required = scene.standard_puppets||[];
        var covered = required.filter(function(id){return placedIds.indexOf(id)!==-1;});
        var coverage = required.length>0?covered.length/required.length:1;
        var score = Math.round(coverage*70);
        return { score:Math.max(0,Math.min(100,score)), correct:coverage>=0.6, character_match:{score:Math.round(coverage*30),comment:''}, spatial:{score:Math.round(coverage*25*0.6),comment:''}, plot_detail:{score:Math.round(coverage*25*0.6),comment:''}, authenticity:{score:coverage>=0.8?16:6,comment:''}, comment:coverage>=0.8?'大致对路。':coverage>=0.5?'还差一些。':'不太对。' };
    },

    _getSceneData(sceneId) {
        if (!ACTS_DATA||!ACTS_DATA.acts) return null;
        for (var i=0;i<ACTS_DATA.acts.length;i++) {
            var a = ACTS_DATA.acts[i];
            if (a.scenes) { var f = a.scenes.find(function(s){return s.id===sceneId;}); if (f) return f; }
        }
        return null;
    },

    _parseJSON(rawText, isImprov) {
        try { return JSON.parse(rawText); } catch(e1) {
            try { var m = rawText.match(/\{[\s\S]*\}/); if (m) return JSON.parse(m[0]); } catch(e2) {}
        }
        return this._defaultResult(isImprov);
    },

    _defaultResult(isImprov) {
        isImprov = isImprov || false;
        return { score:50, correct:true, comment:isImprov?'守护之灵沉默了一会儿。':'师傅沉默了一会儿，微微点了点头。' };
    }
};
</script>

<script>
// ========================================
// puppets.js — 皮影拖拽交互（全面优化版）
// ========================================
(function() {
    'use strict';
    var stage = document.getElementById('stage');
    var cards = document.querySelectorAll('.puppet-card');
    var dragClone = null;
    var dragPuppetId = null;
    var dragSource = null;   // 'card' | 'stage'
    var dragPuppetEl = null; // 舞台上的原皮影元素（从舞台拖动时用）
    var offsetX = 0, offsetY = 0;
    // 舞台渲染尺寸（和 placeOnStage 保持一致）
    var STAGE_W = 100;

    // ---- 皮影箱卡片 mousedown ----
    function onCardMouseDown(e) {
        if (dragClone || e.button !== 0) return;          // 只处理左键，防重入
        e.preventDefault();                                // 阻止浏览器默认拖拽/选中
        e.stopPropagation();
        try { window.getSelection().removeAllRanges(); } catch(_) {}

        dragSource = 'card';
        var card = e.currentTarget;
        dragPuppetId = card.dataset.puppet;

        // 创建浮动 clone —— 尺寸和舞台放置时一致
        dragClone = document.createElement('div');
        dragClone.className = 'puppet-drag-clone';
        dragClone.style.width = STAGE_W + 'px';
        dragClone.innerHTML = window.PuppetImageRenderer
            ? PuppetImageRenderer.render(dragPuppetId, { width: STAGE_W })
            : card.querySelector('.puppet-icon').innerHTML;

        var rect = card.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        dragClone.style.left = (e.clientX - offsetX) + 'px';
        dragClone.style.top  = (e.clientY - offsetY) + 'px';
        document.body.appendChild(dragClone);
        card.classList.add('dragging');
    }

    // ---- 舞台上已放置皮影的 mousedown（二次拖动）----
    function onStagePuppetDown(e) {
        if (dragClone || e.button !== 0) return;
        e.preventDefault();
        e.stopPropagation();
        try { window.getSelection().removeAllRanges(); } catch(_) {}

        dragSource = 'stage';
        dragPuppetEl = e.currentTarget;
        dragPuppetId = dragPuppetEl.dataset.puppet;
        var rect = dragPuppetEl.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;

        // 创建浮动 clone，和舞台原皮影等宽
        dragClone = document.createElement('div');
        dragClone.className = 'puppet-drag-clone';
        dragClone.style.width = STAGE_W + 'px';
        dragClone.innerHTML = window.PuppetImageRenderer
            ? PuppetImageRenderer.render(dragPuppetId, { width: STAGE_W })
            : dragPuppetEl.innerHTML;
        dragClone.style.left = (e.clientX - offsetX) + 'px';
        dragClone.style.top  = (e.clientY - offsetY) + 'px';
        document.body.appendChild(dragClone);

        // 原皮影淡化，不删除
        dragPuppetEl.style.opacity = '0.25';
        dragPuppetEl.style.pointerEvents = 'none';
    }

    // ---- 全局 mousemove ----
    document.addEventListener('mousemove', function(e) {
        if (!dragClone) return;
        e.preventDefault();
        dragClone.style.left = (e.clientX - offsetX) + 'px';
        dragClone.style.top  = (e.clientY - offsetY) + 'px';
    });

    // ---- 全局 mouseup（统一结束拖拽）----
    document.addEventListener('mouseup', function(e) {
        if (!dragClone) return;
        if (e.button !== 0) return;

        finishDrag(e);
    });

    // ---- 鼠标离开窗口 → 强制取消 ----
    document.addEventListener('mouseleave', function(e) {
        if (!dragClone) return;
        cancelDrag();
    });

    // ---- 阻止浏览器原生的 dragstart（防 ghost image）----
    document.addEventListener('dragstart', function(e) {
        e.preventDefault();
    });

    // ---- ESC 取消 ----
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && dragClone) cancelDrag();
    });

    function finishDrag(e) {
        if (dragSource === 'card') {
            // 清除卡片的 dragging 状态
            cards.forEach(function(c) { c.classList.remove('dragging'); });
        }

        dragClone.remove();
        var clone = dragClone;
        var source = dragSource;
        var puppetId = dragPuppetId;
        var puppetEl = dragPuppetEl;
        var offX = offsetX, offY = offsetY;

        // 先清空状态，避免 placeOnStage 里 emit 事件触发其他逻辑时脏读
        dragClone = null; dragPuppetId = null;
        dragSource = null; dragPuppetEl = null;

        var stageRect = stage.getBoundingClientRect();
        var onStage = e.clientX >= stageRect.left && e.clientX <= stageRect.right
                   && e.clientY >= stageRect.top  && e.clientY <= stageRect.bottom;

        if (source === 'card' && onStage) {
            placeOnStage(e.clientX, e.clientY, puppetId);
        } else if (source === 'stage') {
            if (onStage) {
                // 拖动到舞台内 → 更新位置
                var newLeft = e.clientX - stageRect.left - offX;
                var newTop  = e.clientY - stageRect.top  - offY;
                puppetEl.style.left = newLeft + 'px';
                puppetEl.style.top  = newTop  + 'px';
                puppetEl.style.opacity = '1';
                puppetEl.style.pointerEvents = '';
                EventBus.emit('puppet_moved', { id: puppetId, x: Math.round(newLeft), y: Math.round(newTop) });
            } else {
                // 拖到舞台外 → 恢复原位置
                puppetEl.style.opacity = '1';
                puppetEl.style.pointerEvents = '';
            }
        }
    }

    function cancelDrag() {
        // 取消所有拖拽状态
        cards.forEach(function(c) { c.classList.remove('dragging'); });
        if (dragSource === 'stage' && dragPuppetEl) {
            dragPuppetEl.style.opacity = '1';
            dragPuppetEl.style.pointerEvents = '';
        }
        if (dragClone) { dragClone.remove(); dragClone = null; }
        dragPuppetId = null; dragSource = null; dragPuppetEl = null;
    }

    function placeOnStage(x, y, puppetId) {
        var stageRect = stage.getBoundingClientRect();

        var pup = document.createElement('div');
        pup.className = 'stage-puppet';
        pup.dataset.puppet = puppetId;
        pup.style.width = STAGE_W + 'px';
        pup.style.height = 'auto';
        pup.innerHTML = window.PuppetImageRenderer
            ? PuppetImageRenderer.render(puppetId, { width: STAGE_W })
            : '';

        // 鼠标位置就是皮影中心
        pup.style.left = (x - stageRect.left - STAGE_W / 2) + 'px';
        // 用 clone 的实际高度算 top 偏移（approximate: 1.4x 宽度的长宽比）
        var approxH = STAGE_W * 1.4;
        pup.style.top  = (y - stageRect.top  - approxH / 2) + 'px';

        // 绑定后续拖动事件
        pup.addEventListener('mousedown', onStagePuppetDown);

        stage.appendChild(pup);

        var hint = stage.querySelector('.stage-hint');
        if (hint) hint.style.display = 'none';

        EventBus.emit('puppet_placed', {
            id: puppetId,
            x: Math.round(parseInt(pup.style.left)),
            y: Math.round(parseInt(pup.style.top))
        });
    }

    // ---- 初始化：给所有卡片绑定事件 ----
    cards.forEach(function(card) {
        card.addEventListener('mousedown', onCardMouseDown);
    });

    console.log('[puppets] 拖拽系统就绪（优化版），共', cards.length, '张皮影');
})();
</script>

<script>

// theater.js — 舞台管理系统

(function() {
    'use strict';
    var stage       = document.getElementById('stage');
    var btnConfirm  = document.getElementById('btnConfirm');
    var btnAsk      = document.getElementById('btnAsk');
    var dialogueText = document.getElementById('dialogueText');
    var speaker     = document.getElementById('speaker');
    var flame       = document.getElementById('flame');

    var OFFLINE_MODE = (function() {
        if (typeof API_CONFIG === 'undefined') return true;
        var key = API_CONFIG.API_KEY || '';
        if (!key || key.indexOf('请在这里') !== -1 || key === 'sk-未配置') return true;
        return false;
    })();

    if (OFFLINE_MODE) {
        var infoPanel = document.querySelector('.info-panel');
        if (infoPanel) { var badge = document.createElement('div'); badge.style.cssText='margin-top:16px;padding:4px 8px;font-size:11px;color:#c48a3e;border:1px solid #5a2d15;border-radius:2px;letter-spacing:1px;'; badge.textContent='离 线 模 式'; infoPanel.appendChild(badge); }
    }

    // 注意：舞台皮影的拖拽和放置已由 puppets.js 统一接管
    // 这里不再注册 stage.addEventListener('mousedown', ...) 

    // 确认摆影
    btnConfirm.addEventListener('click', function() {
        var staged = collectStagedPuppets();
        if (staged.length===0) { speaker.textContent='路师傅'; typewriter(dialogueText,'白布上还空着呢——先摆几个影儿。'); return; }
        btnConfirm.disabled=true; btnAsk.disabled=true;
        speaker.textContent='路师傅'; dialogueText.textContent='（师傅凑近白布，眯着眼细细端详……）';
        EventBus.emit('stage_confirmed', { puppets: staged });
        var sceneId = getCurrentSceneId();
        var isImprov = (gameState.currentAct===3);
        if (OFFLINE_MODE) {
            setTimeout(function() {
                var result = ShadowJudge.quickJudge(staged, sceneId);
                result.comment = buildOfflineComment(staged, sceneId, result);
                result.guiding_hint = buildOfflineHint(staged, sceneId);
                displayJudgeResult(result);
                emitSceneJudged(staged, sceneId, result);
                btnConfirm.disabled=false; btnAsk.disabled=false;
            }, 800);
        } else {
            if (window.ShadowJudge) {
                ShadowJudge.judge(staged, sceneId, isImprov).then(function(result) {
                    displayJudgeResult(result);
                    emitSceneJudged(staged, sceneId, result);
                }).catch(function() {
                    var r = ShadowJudge.quickJudge(staged, sceneId);
                    displayJudgeResult(r);
                    emitSceneJudged(staged, sceneId, r);
                }).finally(function() { btnConfirm.disabled=false; btnAsk.disabled=false; });
            }
        }
    });

    // 追问师父
    btnAsk.addEventListener('click', function() {
        EventBus.emit('ask_master', { puppets: collectStagedPuppets(), sceneId: getCurrentSceneId() });
        speaker.textContent='路师傅';
        if (OFFLINE_MODE) { var h = buildOfflineHint(collectStagedPuppets(), getCurrentSceneId()); typewriter(dialogueText, h, 45); }
        else { typewriter(dialogueText, '（你向师傅请教——师傅沉吟片刻……）', 40); }
    });

    function buildOfflineComment(staged, sceneId, result) {
        var scene = ShadowJudge._getSceneData(sceneId);
        if (!scene) return '师傅看了看书生，又看了看月亮。';
        var placedIds = staged.map(function(p){return p.puppetId;});
        var required = scene.standard_puppets||[];
        var covered = required.filter(function(id){return placedIds.indexOf(id)!==-1;});
        var coverage = required.length>0?covered.length/required.length:1;
        var missing = required.filter(function(id){return placedIds.indexOf(id)===-1;});
        if (coverage>=0.8) return '嗯——'+scene.name+'，就是这个意思。\n影面里该有的，都有了。';
        if (coverage>=0.5) return '差了点意思。\n'+(missing.length>0?'还缺——'+missing.map(getPuppetName).join('、')+'。\n\n':'')+(scene.cipher_guidance||'再想想，这出戏还差什么？');
        return '不对路。\n这出戏讲的是"'+scene.name+'"——\n'+(missing.length>0?'得有：'+missing.map(getPuppetName).join('、')+'。':'');
    }

    function buildOfflineHint(staged, sceneId) {
        var scene = ShadowJudge._getSceneData(sceneId);
        if (!scene) return '师傅没说话，手指敲了敲操纵杆。';
        var placedIds = staged.map(function(p){return p.puppetId;});
        if (placedIds.indexOf('tree')!==-1) return '路师傅说：我认得一棵槐树，在东街第三个书摊后面。那棵树——比我还老。';
        if (placedIds.indexOf('letter')!==-1) return '路师傅低声说：那封信——写了三年。不是我写的，是我师父。颜体，一笔一画。';
        if (placedIds.indexOf('elder')!==-1&&placedIds.indexOf('letter')!==-1) return '路师傅停了一下：这根杆——本来有三根的。我师父当年……算了。';
        if (placedIds.indexOf('frog')!==-1&&placedIds.indexOf('elder')!==-1) return '路师傅的声音变了：金蟾碎了。戏里是这么写的——但戏外——也碎了。';
        if (placedIds.indexOf('scholar')!==-1) return '路师傅说：书生等的那封信——不是情书。比命还重的东西。';
        var required = scene.standard_puppets||[];
        var missing = required.filter(function(id){return placedIds.indexOf(id)===-1;});
        if (missing.length>0) return '路师傅眯着眼看了看白布：还差点东西。你觉得——'+missing.map(getPuppetName).join('、')+'该摆在哪？';
        return '路师傅点了点头：影面齐了。不过——摆的位置，还要再想想。';
    }

    function collectStagedPuppets() {
        var puppets = stage.querySelectorAll('.stage-puppet');
        var stageRect = stage.getBoundingClientRect();
        return Array.from(puppets).map(function(p) {
            var id = p.dataset.puppet;
            var left = parseInt(p.style.left)||0;
            var top  = parseInt(p.style.top)||0;
            var w = parseInt(p.style.width)||80;
            var h = parseInt(p.style.height)||110;
            return { puppetId:id, name:getPuppetName(id), x:(left+w/2)/(stageRect.width||1), y:(top+h/2)/(stageRect.height||1) };
        });
    }

    function getPuppetName(id) {
        var card = document.querySelector('.puppet-card[data-puppet="'+id+'"]');
        if (card) { var n = card.querySelector('.puppet-name'); if(n) return n.textContent.trim(); }
        var names = { scholar:'书生',tree:'槐树',moon:'月亮',elder:'老者',letter:'信',frog:'金蟾',lamp:'灯',demon:'白骨精',monkey:'孙悟空',bamboo:'竹子',master:'师傅' };
        return names[id]||id;
    }

    function getCurrentSceneId() { return 'act'+gameState.currentAct+'_scene'+(gameState.currentScene+1); }

    function emitSceneJudged(staged, sceneId, result) {
        var scene = ShadowJudge._getSceneData(sceneId);
        var required = scene?scene.standard_puppets||[]:[];
        var placedIds = staged.map(function(p){return p.puppetId;});
        var covered = required.filter(function(id){return placedIds.indexOf(id)!==-1;});
        var coverage = required.length>0?covered.length/required.length:1;
        EventBus.emit('scene_judged', { score:result.score||0, correct:result.correct, coverage:coverage, puppets:staged, sceneId:sceneId });
    }

    function displayJudgeResult(result) {
        speaker.textContent='路师傅';
        var text = '';
        if (result.comment) text += result.comment;
        if (result.guiding_hint) text += '\n\n'+result.guiding_hint;
        if (!text) text = '……（师傅看了看，没说话。）';
        typewriter(dialogueText, text, 55);
    }

    var typewriterTimer = null;
    function typewriter(el, text, speed) {
        speed = speed||50;
        if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer=null; }
        el.textContent=''; el.innerHTML='';
        var i=0;
        typewriterTimer = setInterval(function() {
            if (i<text.length) { var ch=text[i]; if(ch==='\n') el.innerHTML+='<br>'; else el.innerHTML+=ch; i++; }
            else { clearInterval(typewriterTimer); typewriterTimer=null; }
        }, speed);
    }

    function clearStage() {
        var puppets = stage.querySelectorAll('.stage-puppet');
        puppets.forEach(function(p){p.remove();});
        gameState.stagedPuppets=[];
        var hint=stage.querySelector('.stage-hint'); if(hint) hint.style.display='';
    }

    EventBus.on('oil_depleted', function() {
        stage.classList.add('stage-dark');
        if(flame)flame.classList.add('flame-gone');
        speaker.textContent='路师傅'; if(typewriterTimer)clearInterval(typewriterTimer);
        dialogueText.textContent='灯——灭了。'; btnConfirm.disabled=true; btnAsk.disabled=true;
    });

    EventBus.on('narration_chunk', function(data) { if(data.speaker)speaker.textContent=data.speaker; if(data.text)typewriter(dialogueText,data.text,data.speed||50); });
    EventBus.on('judge_result', function(result) { if(!btnConfirm.disabled) displayJudgeResult(result); });

    EventBus.on('countdown_tick', function(data) {
        var cd = document.getElementById('countdownDisplay');
        if(!cd){ cd=document.createElement('div'); cd.id='countdownDisplay'; cd.style.cssText='position:absolute;top:10px;right:20px;color:#e8c97a;font-size:20px;font-weight:bold;text-shadow:0 0 10px rgba(232,180,90,0.5);z-index:100;'; document.body.appendChild(cd); }
        cd.textContent='⏱ '+data.time+' 秒'; if(data.time<=5)cd.style.color='#ff4444';
    });

    EventBus.on('countdown_expired', function() {
        var cd = document.getElementById('countdownDisplay'); if(cd)cd.remove();
        if(!(gameState.currentAct===2&&gameState.currentScene===1)) { console.warn('[theater] countdown_expired ignored'); return; }
        gameState.lampOil=0; updateOilUI();
        var ot=document.getElementById('oilText'); if(ot)ot.textContent='0 / 100';
        var ob=document.getElementById('oilBar'); if(ob)ob.style.width='0%';
        stage.classList.add('stage-dark'); if(flame)flame.classList.add('flame-gone');
        speaker.textContent='路师傅'; typewriter(dialogueText,'时间到了——灯油耗尽了。\n\n白布上一片漆黑……什么也看不见了。',50);
        btnConfirm.disabled=true; btnAsk.disabled=true;
        EventBus.emit('oil_depleted',{reason:'countdown'});
    });

    EventBus.on('act_intermission', function() {
        clearStage();
        stage.classList.remove('stage-dark'); if(flame)flame.classList.remove('flame-gone');
        btnConfirm.disabled=false; btnAsk.disabled=false;
    });

    EventBus.on('save_loaded', function(data) {
        if(data&&data.state) { var ot=document.getElementById('oilText'); if(ot)ot.textContent=data.state.lampOil+' / 100'; var ob=document.getElementById('oilBar'); if(ob)ob.style.width=data.state.lampOil+'%'; }
    });

    window.TheaterSystem = { clearStage:clearStage, collectStagedPuppets:collectStagedPuppets, getCurrentSceneId:getCurrentSceneId, typewriter:typewriter, isOfflineMode:function(){return OFFLINE_MODE;} };
    console.log('[theater] 舞台管理系统就绪'+(OFFLINE_MODE?'（离线模式）':'（在线模式）'));
})();
</script>

<script>
// ========================================
// main.js — 游戏流程控制器
// ========================================
(function() {
    'use strict';
    var sceneConfirmCount = 0;
    var scenePassed = false;
    var advancing = false;

    function resetSceneState() { sceneConfirmCount=0; scenePassed=false; advancing=false; }

    function updateHeader() {
        var header = document.querySelector('.header');
        var sceneInfo = document.getElementById('sceneInfo');
        var actNum = gameState.currentAct;
        var sceneNum = gameState.currentScene+1;
        if (header&&ACTS_DATA&&ACTS_DATA.acts) { var ad=ACTS_DATA.acts[actNum-1]; if(ad) header.textContent='掌 中 光 · 第 '+getActNum(actNum)+' 幕 — '+ad.name; }
        if (sceneInfo&&ACTS_DATA&&ACTS_DATA.acts) { var ad=ACTS_DATA.acts[actNum-1]; if(ad&&ad.scenes&&ad.scenes[gameState.currentScene]) sceneInfo.textContent='第'+sceneNum+'场 · '+ad.scenes[gameState.currentScene].name; }
    }

    function init() {
        try {
            if (typeof ACTS_DATA==='undefined') { showDialogue('路师傅','（数据加载失败。请刷新页面重试。）'); return; }
            updatePuppetCards(gameState.currentAct);
            updateHeader();
            var act1 = ACTS_DATA.acts[0];
            showActIntro(act1, function() { setTimeout(function(){startCurrentScene();},1000); });
        } catch(e) { showDialogue('系统','游戏初始化出错：'+e.message+'。请刷新页面。'); }
    }

    function showActIntro(act, callback) {
        EventBus.emit('narration_chunk', { speaker:'路师傅', text:act.intro, speed:38 });
        var ms = Math.max(4000, Math.ceil(act.intro.length/3*1000)+1000);
        if (callback) setTimeout(callback, ms);
    }

    function startCurrentScene() {
        try {
            resetSceneState();
            EventBus.emit('countdown_stop_request');
            var act = ACTS_DATA.acts[gameState.currentAct-1];
            var scene = act.scenes[gameState.currentScene];
            updateHeader();
            if (window.TheaterSystem&&TheaterSystem.clearStage) TheaterSystem.clearStage();
            var btnC=document.getElementById('btnConfirm'), btnA=document.getElementById('btnAsk');
            if(btnC)btnC.disabled=false; if(btnA)btnA.disabled=false;
            EventBus.emit('narration_chunk', { speaker:'路师傅', text:'「'+scene.name+'」\n\n'+scene.description, speed:35 });
            if (scene.time_limit&&window.LampSystem) { setTimeout(function(){LampSystem.startCountdown();},5000); }
            if (scene.is_improvisation&&scene.keywords) { setTimeout(function(){EventBus.emit('narration_chunk',{speaker:'路师傅',text:'三个词——'+scene.keywords.join('、')+'。\n\n剩下的——该你了。',speed:40});},6000); }
        } catch(e) { showDialogue('路师傅','（……灯晃了一下。刚才说到哪了？——请刷新页面。）'); }
    }

    EventBus.on('scene_judged', function(data) {
        try {
            if (scenePassed||advancing) return;
            sceneConfirmCount++;
            var coverage = data.coverage||0;
            var score = data.score||0;
            var act = ACTS_DATA.acts[gameState.currentAct-1];
            var scene = act.scenes[gameState.currentScene];
            var isImprov = scene.is_improvisation===true;
            var pass = isImprov?sceneConfirmCount>=1:(coverage>=0.8)||(score>=60)||(sceneConfirmCount>=3);
            if (pass) {
                scenePassed=true; advancing=true;
                accumulateEndingStats(data);
                var delay = isImprov?2500:3500;
                setTimeout(function(){advanceScene();}, delay);
            }
        } catch(e) { scenePassed=false; advancing=false; }
    });

    function advanceScene() {
        try {
            EventBus.emit('countdown_stop_request');
            var act = ACTS_DATA.acts[gameState.currentAct-1];
            if (gameState.currentScene+1<act.scenes.length) {
                gameState.currentScene++;
                EventBus.emit('narration_chunk',{speaker:'',text:'——',speed:300});
                setTimeout(function(){startCurrentScene();},1200);
            } else {
                if (gameState.currentAct<3) advanceToNextAct();
                else endGame();
            }
        } catch(e) { resetSceneState(); }
    }

    function advanceToNextAct() {
        try {
            gameState.currentAct++; gameState.currentScene=0;
            EventBus.emit('act_intermission');
            updatePuppetCards(gameState.currentAct);
            updateHeader();
            var nextAct = ACTS_DATA.acts[gameState.currentAct-1];
            var text = ['','—— 第'+getActNum(gameState.currentAct)+'幕 ——','',nextAct.intro].join('\n');
            EventBus.emit('narration_chunk',{speaker:'',text:text,speed:36});
            var ms = Math.max(6000,Math.ceil(nextAct.intro.length/3*1000)+3000);
            setTimeout(function(){startCurrentScene();},ms);
        } catch(e) { showDialogue('路师傅','（幕间换场时出了点岔子……请刷新页面。）'); }
    }

    function endGame() {
        try {
            gameState.isGameOver=true;
            var ending=determineEnding(gameState);
            EventBus.emit('narration_chunk',{speaker:'',text:'【'+ending.name+'】\n\n'+ending.desc,speed:30});
            var bc=document.getElementById('btnConfirm'),ba=document.getElementById('btnAsk');
            if(bc){bc.disabled=true;bc.textContent='剧终';} if(ba){ba.disabled=true;ba.textContent='谢幕';}
            var bn=document.getElementById('btnNext'); if(bn)bn.style.display='none';
            var s=document.getElementById('stage'); if(s)s.classList.add('stage-dark');
            updateHeader();
        } catch(e) {}
    }

    function getActNum(n) { return ['','一','二','三'][n]; }

    function accumulateEndingStats(data) {
        try {
            var act=ACTS_DATA.acts[gameState.currentAct-1];
            var scene=act&&act.scenes?act.scenes[gameState.currentScene]:null;
            if(!scene) return;
            var required=scene.standard_puppets||[], extras=scene.acceptable_extras||[];
            var placedIds=(data.puppets||[]).map(function(p){return p&&(p.puppetId||p.id||p);});
            var covered=required.filter(function(id){return placedIds.indexOf(id)!==-1;});
            var coverage=required.length>0?covered.length/required.length:1;
            var extraCount=placedIds.filter(function(id){return extras.indexOf(id)!==-1;}).length;
            var wrongCount=placedIds.filter(function(id){return required.indexOf(id)===-1&&extras.indexOf(id)===-1;}).length;
            var score=Math.round(coverage*70)+extraCount*5-wrongCount*10;
            score=Math.max(0,Math.min(100,score));
            var creativity=extraCount>0?Math.min(30,extraCount*10+5):0;
            gameState.endingStats.faithfulness+=score;
            gameState.endingStats.creativity+=creativity;
        } catch(e) {}
    }

    function showDialogue(speakerText, text) {
        var se=document.getElementById('speaker'),de=document.getElementById('dialogueText');
        if(se)se.textContent=speakerText||''; if(de)de.textContent=text||'';
    }

    function updatePuppetCards(actNum) {
        var cards=document.querySelectorAll('.puppet-card');
        var vc=0;
        cards.forEach(function(card){
            var acts=(card.dataset.act||'').split(',');
            if(acts.indexOf(String(actNum))>=0) { card.classList.remove('hidden'); vc++; }
            else card.classList.add('hidden');
        });
        console.log('[main] 皮影箱已切换至第'+getActNum(actNum)+'幕（显示'+vc+'个角色）');
    }

    if (document.readyState==='loading') { document.addEventListener('DOMContentLoaded',init); }
    else { init(); }
    console.log('[main] 游戏流程控制器就绪');
})();
</script>

</body>
