<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掌中光 · 第一幕开场白测试</title>
<style>
  :root { --bg:#1a0f08; --panel:#2a1a0a; --text:#e8d5b7; --accent:#FF8C00; --purple:#a064c8; --border:#4a3020; --green:#4CAF50; --red:#f44336; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Serif SC','SimSun',serif;min-height:100vh;display:flex;justify-content:center;padding:30px 16px}
  .container{max-width:800px;width:100%}
  .header{text-align:center;margin-bottom:24px}
  .header h1{font-size:28px;color:var(--accent);letter-spacing:6px}
  .header p{font-size:13px;color:#8a7560;margin-top:4px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:18px 20px;margin-bottom:16px}
  .card h2{font-size:15px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:6px;color:var(--accent)}
  label{font-size:12px;color:#a09080;display:block;margin-bottom:3px}
  input,select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-family:inherit;font-size:13px;outline:none;width:100%}
  input:focus,select:focus{border-color:var(--accent)}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row>*{flex:1;min-width:120px}
  button{padding:8px 18px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-family:inherit;font-size:13px;border-radius:4px;cursor:pointer;transition:all .2s;letter-spacing:1px;white-space:nowrap}
  button:hover{background:var(--accent);color:var(--bg)}
  button:disabled{opacity:.4;cursor:not-allowed}
  button.primary{background:var(--accent);color:var(--bg);font-weight:bold}
  button.purple{border-color:var(--purple);color:var(--purple)}
  button.purple:hover{background:var(--purple);color:var(--bg)}
  button.danger{border-color:var(--red);color:var(--red)}
  button.danger:hover{background:var(--red);color:var(--bg)}
  .oil-presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .oil-chip{padding:5px 12px;border:1px solid var(--border);border-radius:14px;cursor:pointer;font-size:11px;color:#a09080;background:var(--bg);transition:all .2s;user-select:none}
  .oil-chip:hover{border-color:var(--accent);color:var(--text)}
  .oil-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(255,140,0,.1)}
  .oil-chip .oil-desc{font-size:10px;color:#6a5040;display:block}
  .params{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;font-size:11px;color:#a09080;margin-top:8px}
  .params div{background:var(--bg);padding:6px 8px;border-radius:4px;text-align:center}
  .params strong{color:var(--accent);display:block;font-size:14px}
  .output-area{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:24px 28px;min-height:140px;font-size:18px;line-height:2.2;white-space:pre-wrap;letter-spacing:1px;position:relative}
  .output-area .placeholder{color:#555}
  .output-area.streaming::after{content:'▎';animation:blink .8s infinite;color:var(--accent)}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .prompt-box{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:10px 12px;font-size:11px;line-height:1.6;color:#6a5040;max-height:180px;overflow-y:auto;font-family:Consolas,monospace;white-space:pre-wrap;word-break:break-all}
  .prompt-box.collapsed{max-height:60px;overflow:hidden;position:relative}
  .prompt-box.collapsed::after{content:'';position:absolute;bottom:0;left:0;right:0;height:30px;background:linear-gradient(transparent,var(--bg))}
  .status{display:flex;align-items:center;gap:6px;font-size:12px;color:#8a7560;margin-top:6px}
  .dot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0}
  .dot.loading{background:var(--accent);animation:blink .6s infinite}
  .dot.success{background:var(--green)}.dot.error{background:var(--red)}
  .hint{font-size:12px;color:#b85a00;background:rgba(255,140,0,.06);padding:10px;border-radius:4px;border-left:3px solid var(--accent);margin-top:8px}
  .warn{font-size:12px;color:#e67e22;background:rgba(230,126,34,.06);padding:10px;border-radius:4px;border-left:3px solid #e67e22;margin-top:8px}
  .info-row{display:flex;justify-content:space-between;font-size:11px;color:#6a5040;margin-top:4px}
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1>掌 中 光</h1><p>第一幕「琉璃厂·书生与鹤」开场白测试</p></div>

  <div class="card">
    <h2>🔑 API 配置</h2>
    <div class="row">
      <div style="flex:2"><label>API Key</label><input type="password" id="apiKey" placeholder="sk-xxxxxxxx"></div>
      <div style="flex:1"><label>模型</label><select id="model">
        <option value="qwen-turbo">qwen-turbo</option><option value="qwen-plus">qwen-plus</option><option value="qwen-max" selected>qwen-max</option>
      </select></div>
      <div style="display:flex;align-items:flex-end"><button onclick="App.saveConfig()">💾 保存</button></div>
    </div>
    <div id="liveServerWarn" class="warn" style="display:none">
      ⚠️ <code>file://</code> 协议。请使用 <b>Live Server</b> 打开。
    </div>
  </div>

  <div class="card">
    <h2>🪔 测试参数</h2>
    <label>灯油量（影响师傅的语气、字数和语速）</label>
    <div class="oil-presets" id="oilPresets"></div>
    <div class="params">
      <div>等第<div><strong id="pQuality">high</strong></div></div>
      <div>字数<div><strong id="pWords">120~250字</strong></div></div>
      <div>语速<div><strong id="pSpeed">220ms/字</strong></div></div>
      <div>戏中戏<div><strong>刘海戏金蟾</strong></div></div>
    </div>
  </div>

  <div class="card">
    <h2>🎭 测试控制</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="purple" id="btnPreview" onclick="App.preview()">👁 预览Prompt</button>
      <button class="primary" id="btnTest" onclick="App.run()">🔮 路师傅，请开场</button>
      <button class="danger" id="btnStop" onclick="App.stop()" style="display:none">⏹ 停止</button>
    </div>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">就绪 — 配置 API Key 后点「路师傅，请开场」</span></div>
  </div>

  <div class="card">
    <h2>📋 System Prompt <span style="font-size:11px;color:#6a5040;font-weight:normal">（点击展开/折叠）</span></h2>
    <div class="prompt-box collapsed" id="promptBox" onclick="App.togglePrompt()" title="点击展开/折叠">点击「预览Prompt」查看……</div>
  </div>

  <div class="card">
    <h2>📜 路师傅说：</h2>
    <div class="output-area" id="output"><span class="placeholder">等待路师傅开口……</span></div>
    <div class="info-row"><span id="info1"></span><span id="info2"></span></div>
  </div>
  <div class="hint">💡 灯油越低 → 字数越少、语速越慢、语气越碎。支持中途停止。</div>
</div>

<!-- ===== 一、模块加载（script标签注入 → 兼容 file://和http://） ===== -->
<script>
const ModuleLoader = {
  _ready: false, _error: '',
  _loadByTag(url) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = url;
      s.onload = () => { console.log('  [加载]', url, '✅'); resolve(); };
      s.onerror = () => reject(new Error('文件不存在: ' + url));
      document.head.appendChild(s);
    });
  },
  async init() {
    // 加载顺序：配置 → 数据 → 引擎
    const files = ['js/config.example.js', 'data/prompts.json', 'data/acts.json', 'js/prompt-builder.js'];
    for (const url of files) {
      try { await this._loadByTag(url); } catch (e) {
        try { const r = await fetch(url); if (!r.ok) throw new Error('HTTP ' + r.status); (0, eval)(await r.text()); console.log('  [加载]', url, '✅ (fetch)'); } catch (e2) { this._error = '加载 ' + url + ' 失败'; console.error(this._error); throw new Error(this._error); }
      }
    }
    if (typeof PROMPTS_DATA === 'undefined') throw new Error('PROMPTS_DATA 未定义');
    if (typeof ACTS_DATA     === 'undefined') throw new Error('ACTS_DATA 未定义');
    if (typeof promptBuilder === 'undefined') throw new Error('promptBuilder 未定义');
    this._ready = true;
  },
  get ready() { return this._ready; }
};
</script>

<!-- ===== 二、应用逻辑 ===== -->
<script>
const App = {
  _oil: 100, _abortCtrl: null,
  OIL_PRESETS: [{ pct:100,label:'满油',desc:'灯光明亮' },{ pct:80,label:'80%',desc:'正常' },{ pct:50,label:'50%',desc:'疲惫' },{ pct:35,label:'35%',desc:'意识混乱' },{ pct:15,label:'15%',desc:'呓语' }],
  _quality(p) { return p>=80?'high':p>=50?'medium':p>=20?'low':'critical'; },
  _speed(p) { const q=this._quality(p); const b={high:[150,1.5],medium:[180,2.0],low:[220,2.5],critical:[260,3.0]}[q]; return Math.round((100-p)*b[1]+b[0]); },
  _words(p) { return {high:'120~250字',medium:'60~120字',low:'30~60字（碎片）',critical:'10~30字（呓语）'}[this._quality(p)]; },
  buildPrompt() { const gs={ lampOil:this._oil,currentAct:1,currentScene:0,aiQuality:this._quality(this._oil),triggeredClues:[] }; return promptBuilder.buildOpeningPrompt(gs); },

  init() {
    if (location.protocol==='file:') document.getElementById('liveServerWarn').style.display='block';
    const c=document.getElementById('oilPresets');
    this.OIL_PRESETS.forEach(p=>{ const e=document.createElement('span'); e.className='oil-chip'+(p.pct===this._oil?' active':''); e.innerHTML=p.label+'<span class="oil-desc">'+p.desc+'</span>'; e.onclick=()=>this.setOil(p.pct); c.appendChild(e); });
    this.loadConfig(); this._refreshParams();
  },
  setOil(p) { this._oil=p; document.querySelectorAll('.oil-chip').forEach((e,i)=>{ e.classList.toggle('active',this.OIL_PRESETS[i].pct===p); }); this._refreshParams(); },
  _refreshParams() { document.getElementById('pQuality').textContent=this._quality(this._oil); document.getElementById('pWords').textContent=this._words(this._oil); document.getElementById('pSpeed').textContent=this._speed(this._oil)+'ms/字'; },

  preview() {
    if (!ModuleLoader.ready) return this._warn('模块尚未加载完毕');
    const {systemPrompt,userMessage}=this.buildPrompt();
    const b=document.getElementById('promptBox');
    b.textContent='══════ System Prompt（'+systemPrompt.length+'字） ══════\n'+systemPrompt+'\n\n══════ User Message（'+userMessage.length+'字） ══════\n'+userMessage;
    b.classList.remove('collapsed');
    document.getElementById('output').innerHTML='<span class="placeholder">Prompt 已生成。点击「路师傅，请开场」开始说戏。</span>';
    this._status('success','Prompt 已生成 → 共 '+(systemPrompt.length+userMessage.length)+' 字');
  },
  togglePrompt() { const b=document.getElementById('promptBox'); b.classList.toggle('collapsed'); },

  async _streamAPI(sys,msg,speedMs) {
    const key=document.getElementById('apiKey').value.trim();
    // API地址：优先走代理（无需前端Key），否则直连DashScope
    const useProxy = (typeof API_CONFIG !== 'undefined' && API_CONFIG.BASE_API);
    const apiUrl = useProxy ? API_CONFIG.BASE_API + '/llm/stream' : 'http://123.57.90.233:3000/api/llm/stream';
    const headers = useProxy ? {'Content-Type':'application/json'} : {'Content-Type':'application/json','Authorization':'Bearer '+key};
    if (!useProxy && (!key||!key.startsWith('sk-'))) throw new Error('请先填入 API Key，或通过代理服务器访问');

    this._abortCtrl=new AbortController();
    const r=await fetch(apiUrl,{method:'POST',headers:headers,body:JSON.stringify({model:document.getElementById('model').value,messages:[{role:'system',content:sys},{role:'user',content:msg}],max_tokens:500,temperature:0.8,stream:true}),signal:this._abortCtrl.signal});
    if(!r.ok){const t=await r.text().catch(()=>'');if(r.status===401)throw new Error('API Key 无效（401）');if(r.status===429)throw new Error('请求太频繁（429）');throw new Error('HTTP '+r.status+': '+t.substring(0,150));}
    const reader=r.body.getReader(),dec=new TextDecoder();let buf='',full='',charQ=[],apiDone=false;
    (async()=>{try{while(true){const{done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});const ls=buf.split('\n');buf=ls.pop()||'';for(const l of ls){const t=l.trim();if(!t||!t.startsWith('data:')||t==='data:[DONE]')continue;try{const c=JSON.parse(t.slice(5)).choices?.[0]?.delta?.content;if(c){full+=c;for(const ch of c)charQ.push(ch);}}catch(e){}}}}finally{apiDone=true;}})();
    const out=document.getElementById('output');let displayed=0;
    const P={ '。':speedMs+600,'！':speedMs+500,'？':speedMs+500,'，':speedMs+250,'、':speedMs+200,'；':speedMs+350,'：':speedMs+300,'…':speedMs+800,'—':speedMs+400 };
    while(true){if(this._abortCtrl.signal.aborted)break;if(!charQ.length){if(apiDone)break;await new Promise(rs=>setTimeout(rs,10));continue;}const ch=charQ.shift();displayed++;out.textContent=full.substring(0,displayed);await new Promise(rs=>setTimeout(rs,P[ch]||speedMs));}
    if(!this._abortCtrl.signal.aborted) out.textContent=full;
    this._abortCtrl=null; return full;
  },

  async run() {
    if (!ModuleLoader.ready) return this._warn('模块尚未加载完毕');
    const btn=document.getElementById('btnTest'),stopBtn=document.getElementById('btnStop'),out=document.getElementById('output'),speed=this._speed(this._oil);
    btn.disabled=true;btn.textContent='⏳ 路师傅在清嗓子……';stopBtn.style.display='inline-block';out.innerHTML='';out.classList.add('streaming');
    document.getElementById('info1').textContent='';document.getElementById('info2').textContent='';
    this._status('loading','连接中……灯油'+this._oil+'% 语速'+speed+'ms/字');const st=Date.now();
    try{
      const {systemPrompt,userMessage}=this.buildPrompt();
      const pb=document.getElementById('promptBox');pb.textContent='══════ System Prompt（'+systemPrompt.length+'字） ══════\n'+systemPrompt;pb.classList.add('collapsed');
      const fullText=await this._streamAPI(systemPrompt,userMessage,speed);
      out.classList.remove('streaming');out.innerHTML=this._esc(fullText);
      const el=((Date.now()-st)/1000).toFixed(1);
      document.getElementById('info1').textContent='⏱ '+el+'s';document.getElementById('info2').textContent='📝 '+fullText.length+'字 · '+speed+'ms/字';
      this._status('success','完成 → '+fullText.length+'字 / '+el+'s / 灯油'+this._oil+'%');
    }catch(e){
      out.classList.remove('streaming');
      if(e.name==='AbortError'){out.innerHTML='<span style="color:#e67e22">⏹ 已停止。</span>';this._status('idle','已停止');}
      else{out.innerHTML='<span style="color:var(--red)">❌ '+this._esc(e.message)+'</span>';this._status('error','失败 — '+e.message.substring(0,40));console.error(e);}
    }
    btn.disabled=false;btn.textContent='🔮 路师傅，请开场';stopBtn.style.display='none';
  },
  stop() { if(this._abortCtrl){this._abortCtrl.abort();this._abortCtrl=null;} },
  saveConfig() { localStorage.setItem('zhongzhongguang_act1_test',JSON.stringify({key:document.getElementById('apiKey').value,model:document.getElementById('model').value})); this._status('success','已保存'); },
  loadConfig() { try{const d=JSON.parse(localStorage.getItem('zhongzhongguang_act1_test'));if(d){document.getElementById('apiKey').value=d.key||'';document.getElementById('model').value=d.model||'qwen-max';}}catch(e){} },
  _status(c,m) { document.getElementById('dot').className='dot '+c;document.getElementById('statusText').textContent=m; },
  _esc(t) { const d=document.createElement('div');d.textContent=t||'';return d.innerHTML; },
  _warn(m) { document.getElementById('output').innerHTML='<span style="color:var(--red)">❌ '+this._esc(m+(ModuleLoader.error?' — '+ModuleLoader.error:''))+'</span>'; this._status('error',m); }
};
</script>

<!-- ===== 三、启动 ===== -->
<script>
(async function boot(){
  console.log('🎭 掌中光 · 第一幕开场白测试');
  try{ await ModuleLoader.init(); console.log('   模块加载 ✅'); }catch(e){ console.error(e); document.getElementById('statusText').textContent='⚠️ '+e.message; document.getElementById('output').innerHTML='<span style="color:var(--red)">❌ '+e.message+'</span>'; return; }
  App.init();
  const mode = (typeof API_CONFIG!=='undefined' && API_CONFIG.BASE_API) ? '代理('+API_CONFIG.BASE_API+')' : '直连DashScope';
  console.log('   应用就绪 ✅ | 灯油='+App._oil+'% | ' + mode);
  document.getElementById('statusText').textContent += ' | ' + mode;
})();
</script>
</body>
</html>
